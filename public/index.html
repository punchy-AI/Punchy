          description: "Need a designer to create a mobile app interface for a fitness startup. Should be modern, minimalist, and user-friendly."
        },
        writer: {
          job: "Content Writer",
          skills: "SEO, Blog Posts, Technical Writing",
          languages: "English (native)",
          description: "Looking for a writer to create weekly blog posts about SaaS and technology. Must understand SEO and B2B audiences."
        },
        translator: {
          job: "Translator",
          skills: "English to French, Spanish to English",
          languages: "French (native), English (fluent), Spanish (advanced)",
          description: "Need a translator for legal documents from English to French. Must be precise and experienced with legal terminology."
        },
        marketing: {
          job: "Marketing Specialist",
          skills: "Social Media, Google Ads, Content Strategy",
          languages: "English (fluent)",
          description: "Looking for a marketing expert to help launch a new SaaS product. Need strategy for social media and paid ads."
        }
      };
      const ex = examples[type];
      if (ex) {
        document.getElementById('job').value = ex.job;
        document.getElementById('skills').value = ex.skills;
        document.getElementById('languages').value = ex.languages;
        document.getElementById('description').value = ex.description;
        document.getElementById('charCount').textContent = ex.description.length;
      }
    }

    async function generateProposal() {
      const job = document.getElementById('job').value;
      const skills = document.getElementById('skills').value;
      const languages = document.getElementById('languages').value;
      const clientType = document.getElementById('clientType').value;
      const platform = document.getElementById('platform').value;
      const tone = document.getElementById('tone').value;
      const description = document.getElementById('description').value;
      const length = document.getElementById('length').value;
      const language = document.getElementById('language').value;

      const recaptchaResponse = grecaptcha.getResponse();
      if (!recaptchaResponse) {
        showToast('Please complete the reCAPTCHA', true);
        return;
      }

      if (!job || !skills || !description) {
        showToast('Please fill in required fields', true);
        return;
      }

      document.getElementById('results').innerHTML = `
        <div class="bg-white rounded-xl p-8 text-center">
          <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
          <p class="text-gray-600">AI is writing your proposals...</p>
        </div>
      `;

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            job, skills, languages, clientType, platform, tone, description,
            length, language, recaptcha: recaptchaResponse
          })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error);
        displayResults(data);
        saveToHistory(data);
      } catch (error) {
        document.getElementById('results').innerHTML = `
          <div class="bg-red-50 border border-red-200 rounded-xl p-6 text-center text-red-700">
            <i class="fas fa-exclamation-triangle text-3xl mb-3"></i>
            <p>Something went wrong. Please try again.</p>
          </div>
        `;
      }
    }

    function displayResults(data) {
      let html = '';

      html += `
        <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
          <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
            <h3 class="font-semibold"><i class="fas fa-briefcase text-blue-500 mr-2"></i>Professional Proposal</h3>
            <div class="flex items-center gap-3">
              <button onclick="copyText('professional')" class="text-gray-500 hover:text-blue-600" title="Copy">
                <i class="far fa-copy"></i>
              </button>
              <button onclick="downloadPDF('professional', 'Professional Proposal')" class="text-gray-500 hover:text-blue-600" title="Download PDF">
                <i class="fas fa-file-pdf"></i>
              </button>
              <div class="flex gap-1 ml-2 border-l border-gray-300 pl-2">
                <button onclick="feedback('professional', '👍')" class="feedback-btn text-gray-400 hover:text-green-500 text-sm">👍</button>
                <button onclick="feedback('professional', '👎')" class="feedback-btn text-gray-400 hover:text-red-500 text-sm">👎</button>
              </div>
            </div>
          </div>
          <div class="p-6" id="professional">${data.professional}</div>
        </div>
      `;

      html += `
        <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
          <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
            <h3 class="font-semibold"><i class="fas fa-compress text-blue-500 mr-2"></i>Short Version</h3>
            <div class="flex items-center gap-3">
              <button onclick="copyText('short')" class="text-gray-500 hover:text-blue-600" title="Copy">
                <i class="far fa-copy"></i>
              </button>
              <button onclick="downloadPDF('short', 'Short Proposal')" class="text-gray-500 hover:text-blue-600" title="Download PDF">
                <i class="fas fa-file-pdf"></i>
              </button>
              <div class="flex gap-1 ml-2 border-l border-gray-300 pl-2">
                <button onclick="feedback('short', '👍')" class="feedback-btn text-gray-400 hover:text-green-500 text-sm">👍</button>
                <button onclick="feedback('short', '👎')" class="feedback-btn text-gray-400 hover:text-red-500 text-sm">👎</button>
              </div>
            </div>
          </div>
          <div class="p-6" id="short">${data.short}</div>
        </div>
      `;

      html += `
        <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
          <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
            <h3 class="font-semibold"><i class="fas fa-fire text-blue-500 mr-2"></i>Persuasive Version</h3>
            <div class="flex items-center gap-3">
              <button onclick="copyText('persuasive')" class="text-gray-500 hover:text-blue-600" title="Copy">
                <i class="far fa-copy"></i>
              </button>
              <button onclick="downloadPDF('persuasive', 'Persuasive Proposal')" class="text-gray-500 hover:text-blue-600" title="Download PDF">
                <i class="fas fa-file-pdf"></i>
              </button>
              <div class="flex gap-1 ml-2 border-l border-gray-300 pl-2">
                <button onclick="feedback('persuasive', '👍')" class="feedback-btn text-gray-400 hover:text-green-500 text-sm">👍</button>
                <button onclick="feedback('persuasive', '👎')" class="feedback-btn text-gray-400 hover:text-red-500 text-sm">👎</button>
              </div>
            </div>
          </div>
          <div class="p-6" id="persuasive">${data.persuasive}</div>
        </div>
      `;

      document.getElementById('results').innerHTML = html;
    }

    function saveToHistory(data) {
      let history = JSON.parse(localStorage.getItem('proposalHistory')) || [];
      history.unshift({
        date: new Date().toLocaleString(),
        professional: data.professional.substring(0, 100) + '...',
        fullData: data
      });
      history = history.slice(0, CONFIG.PROPOSAL.HISTORY_LIMIT);
      localStorage.setItem('proposalHistory', JSON.stringify(history));
      displayHistory();
    }

    function displayHistory() {
      const history = JSON.parse(localStorage.getItem('proposalHistory')) || [];
      const historyDiv = document.getElementById('historyList');
      
      if (history.length === 0) {
        historyDiv.innerHTML = '<p class="text-gray-400 text-sm">No history yet. Generate your first proposal!</p>';
        return;
      }
      
      let html = '';
      history.forEach((item, index) => {
        html += `
          <div class="history-item" onclick="loadFromHistory(${index})">
            <div class="flex justify-between items-center mb-1">
              <span class="text-xs text-gray-500"><i class="far fa-clock mr-1"></i>${item.date}</span>
              <span class="text-blue-500 text-xs"><i class="fas fa-redo-alt mr-1"></i> Load</span>
            </div>
            <p class="text-gray-700">${item.professional}</p>
          </div>
        `;
      });
      
      historyDiv.innerHTML = html;
    }

    function loadFromHistory(index) {
      const history = JSON.parse(localStorage.getItem('proposalHistory')) || [];
      if (history[index] && history[index].fullData) {
        displayResults(history[index].fullData);
        showToast('✓ Proposal loaded from history');
        switchMode('proposal');
      }
    }

    function clearHistory() {
      if (confirm('Clear all history?')) {
        localStorage.removeItem('proposalHistory');
        displayHistory();
        showToast('✓ History cleared');
      }
    }

    function copyText(id) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        showToast('✓ Copied to clipboard!');
      }).catch(() => {
        showToast('Copy failed. Please select manually.', true);
      });
    }

    function downloadPDF(elementId, title) {
      const element = document.getElementById(elementId);
      const toast = showToast('📄 Preparing PDF...', false, true);
      
      try {
        const { jsPDF } = window.jspdf;
        const text = element.innerText;
        const doc = new jsPDF({
          orientation: 'portrait',
          unit: 'mm',
          format: 'a4'
        });
        doc.setFontSize(18);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(37, 99, 235);
        doc.text('FreelancePitch Pro', 20, 20);
        doc.setFontSize(14);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(0, 0, 0);
        doc.text(title, 20, 35);
        doc.setFontSize(10);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(100, 100, 100);
        doc.text(`Generated on: ${new Date().toLocaleString()}`, 20, 45);
        doc.setDrawColor(37, 99, 235);
        doc.line(20, 50, 190, 50);
        doc.setFontSize(11);
        doc.setTextColor(0, 0, 0);
        const splitText = doc.splitTextToSize(text, 170);
        doc.text(splitText, 20, 60);
        doc.save(`${title.replace(/\s+/g, '_')}.pdf`);
        showToast('✓ PDF downloaded successfully!');
      } catch (error) {
        showToast('❌ PDF generation failed', true);
      } finally {
        if (toast && toast.parentNode) toast.remove();
      }
    }

    function feedback(proposalId, type) {
      const proposalText = document.getElementById(proposalId).innerText;
      let feedbacks = JSON.parse(localStorage.getItem('feedbacks')) || [];
      feedbacks.push({
        proposal: proposalText.substring(0, 100) + '...',
        type: type,
        date: new Date().toISOString()
      });
      if (feedbacks.length > 50) feedbacks = feedbacks.slice(-50);
      localStorage.setItem('feedbacks', JSON.stringify(feedbacks));
      showToast(`✓ Thanks for your ${type} feedback!`);
    }

    function showToast(message, isError = false, persistent = false) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      if (isError) {
        toast.style.borderLeftColor = '#ef4444';
        toast.innerHTML = `<i class="fas fa-exclamation-circle" style="color: #ef4444"></i> ${message}`;
      } else {
        toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
      }
      document.body.appendChild(toast);
      
      if (!persistent) {
        setTimeout(() => {
          toast.classList.add('fade-out');
          setTimeout(() => toast.remove(), 300);
        }, 2000);
      }
      
      return toast;
    }

    // ============================================
    // INITIALISATION
    // ============================================
    displayHistory();
    
    if (chatHistory.length > 0) {
      suggestionsSection.classList.add('hidden');
      conversationArea.classList.remove('hidden');
      messageIds.clear();
      const previousHeight = conversationArea.scrollHeight;
      chatHistory.forEach(msg => addMessage(msg.content, msg.sender, true));
      requestAnimationFrame(() => {
        conversationArea.scrollTop += conversationArea.scrollHeight - previousHeight;
      });
    }

    const descInput = document.getElementById('description');
    const charSpan = document.getElementById('charCount');
    if (descInput) {
      descInput.addEventListener('input', function() {
        charSpan.textContent = this.value.length;
      });
    }

    updateMicButton();
    
    if (conversationArea) {
      conversationArea.addEventListener('scroll', () => {
        isUserScrolling = true;
        if (scrollTimeout) clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
          isUserScrolling = false;
          updateAutoScrollState();
        }, 150);
        updateAutoScrollState();
      }, { passive: true });
      createScrollButton();
      initResizeObserver();
    }

    sendBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (!sendBtn.disabled && input.value.trim() !== '') sendMessage();
    });
    
    window.setSearchMode = null;
    window.performSearch = null;
    window.performUniversalSearch = performUniversalSearch;
  </script>
</body>
  </html>
