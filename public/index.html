    async function generateProposal() {
      const job = document.getElementById('job').value;
      const skills = document.getElementById('skills').value;
      const languages = document.getElementById('languages').value;
      const clientType = document.getElementById('clientType').value;
      const platform = document.getElementById('platform').value;
      const tone = document.getElementById('tone').value;
      const description = document.getElementById('description').value;
      const length = document.getElementById('length').value;
      const language = document.getElementById('language').value;

      let recaptchaResponse = '';
      if (typeof grecaptcha !== 'undefined' && recaptchaWidgetId !== null) {
        recaptchaResponse = grecaptcha.getResponse(recaptchaWidgetId);
      }

      if (!recaptchaResponse) {
        showToast('Please complete the reCAPTCHA', true);
        return;
      }

      if (!job || !skills || !description) {
        showToast('Please fill in required fields', true);
        return;
      }

      document.getElementById('results').innerHTML = `
        <div class="bg-white rounded-xl p-8 text-center">
          <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
          <p class="text-gray-600">AI is writing your proposals...</p>
        </div>
      `;

      startProgress();

      try {
        const response = await fetch(`${API_BASE_URL}/api/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            job, skills, languages, clientType, platform, tone, description,
            length, language, recaptcha: recaptchaResponse
          })
        });

        completeProgress();

        const data = await response.json();
        if (data.error) throw new Error(data.error);
        displayResults(data);
        saveToHistory(data);
      } catch (error) {
        completeProgress();
        document.getElementById('results').innerHTML = `
          <div class="bg-red-50 border border-red-200 rounded-xl p-6 text-center text-red-700">
            <i class="fas fa-exclamation-triangle text-3xl mb-3"></i>
            <p>An error occurred. Please try again.</p>
          </div>
        `;
      }
    }

    function saveToHistory(data) {
      let history = getUserStorage('proposalHistory', []);
      history.unshift({
        date: new Date().toLocaleString(),
        professional: data.professional.substring(0, 100) + '...',
        fullData: data
      });
      history = history.slice(0, CONFIG.PROPOSAL.HISTORY_LIMIT);
      setUserStorage('proposalHistory', history);
      displayHistory();
    }

    function displayHistory() {
      const history = getUserStorage('proposalHistory', []);
      const historyDiv = document.getElementById('historyList');
      
      if (history.length === 0) {
        historyDiv.innerHTML = '<p class="text-gray-400 text-sm">No history yet. Generate your first proposal!</p>';
        return;
      }
      
      let html = '';
      history.forEach((item, index) => {
        html += `
          <div class="history-item" onclick="loadFromHistory(${index})">
            <div class="flex justify-between items-center mb-1">

    function loadFromHistory(index) {
      const history = getUserStorage('proposalHistory', []);

        displayResults(history[index].fullData);
        showToast('✓ Proposal loaded from history');
        switchMode('proposal');

    function copyText(id) {
      const text = document.getElementById(id).innerText;
      navigator.clipboard.writeText(text).then(() => {
        showToast('✓ Copied to clipboard!');
      }).catch(() => {
        showToast('Failed to copy. Please select manually.', true);
      });
    }

    function downloadPDF(elementId, title) {
      const element = document.getElementById(elementId);
      const toast = showToast('📄 Preparing PDF...', false, true);
      
      try {
        const { jsPDF } = window.jspdf;
        const text = element.innerText;
        const doc = new jsPDF({
          orientation: 'portrait',
          unit: 'mm',
          format: 'a4'
        });
        doc.setFontSize(18);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(37, 99, 235);
        doc.text('CORE AI', 20, 20);
        doc.setFontSize(14);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(0, 0, 0);
        doc.text(title, 20, 35);
        doc.setFontSize(10);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(100, 100, 100);
        doc.text(`Generated: ${new Date().toLocaleString()}`, 20, 45);
        doc.setDrawColor(37, 99, 235);
        doc.line(20, 50, 190, 50);
        doc.setFontSize(11);
        doc.setTextColor(0, 0, 0);
        const splitText = doc.splitTextToSize(text, 170);
        doc.text(splitText, 20, 60);
        doc.save(`${title.replace(/\s+/g, '_')}.pdf`);
        showToast('✓ PDF downloaded successfully!');
      } catch (error) {
        showToast('❌ PDF generation failed', true);
      } finally {
        if (toast && toast.parentNode) toast.remove();
      }
    }

    function feedback(proposalId, type) {
      const proposalText = document.getElementById(proposalId).innerText;
      let feedbacks = getUserStorage('feedbacks', []);
      feedbacks.push({
        proposal: proposalText.substring(0, 100) + '...',
        type: type,
        date: new Date().toISOString()
      });
      if (feedbacks.length > 50) feedbacks = feedbacks.slice(-50);
      setUserStorage('feedbacks', feedbacks);
      showToast(`✓ Thank you for your feedback ${type}!`);
    }

    function showToast(message, isError = false, persistent = false) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      if (isError) {
        toast.style.borderLeftColor = '#ef4444';
        toast.innerHTML = `<i class="fas fa-exclamation-circle" style="color: #ef4444"></i> ${message}`;
      } else {
        toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
      }
      document.body.appendChild(toast);
      
      if (!persistent) {
        setTimeout(() => {
          toast.classList.add('fade-out');
          setTimeout(() => toast.remove(), 300);
        }, 2000);
      }
      
      return toast;
    }

    // ============================================
    // INITIALIZATION
    // ============================================
    displayHistory();
    
    if (chatHistory.length > 0) {
      suggestionsSection.classList.add('hidden');
      conversationArea.classList.remove('hidden');
      messageIds.clear();
      const previousHeight = conversationArea.scrollHeight;
      chatHistory.forEach(msg => addMessage(msg.content, msg.sender, true));
      requestAnimationFrame(() => {
        conversationArea.scrollTop += conversationArea.scrollHeight - previousHeight;
      });
    }

    const descInput = document.getElementById('description');
    const charSpan = document.getElementById('charCount');
    if (descInput) {
      descInput.addEventListener('input', function() {
        charSpan.textContent = this.value.length;
      });
    }

    updateMicButton();
    
    if (conversationArea) {
      conversationArea.addEventListener('scroll', () => {
        isUserScrolling = true;
        if (scrollTimeout) clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
          isUserScrolling = false;
          updateAutoScrollState();
        }, 150);
        updateAutoScrollState();
      }, { passive: true });
      createScrollButton();
      initResizeObserver();
    }

    sendBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (!sendBtn.disabled && input.value.trim() !== '') sendMessage();
    });

    // Setup drag & drop
    setupDragAndDrop();

    // Update reCAPTCHA theme when dark mode changes
    const originalToggleDarkMode = toggleDarkMode;
    toggleDarkMode = function() {
      originalToggleDarkMode();
      if (typeof grecaptcha !== 'undefined' && recaptchaWidgetId !== null) {
        grecaptcha.reset(recaptchaWidgetId);
      }
    };
