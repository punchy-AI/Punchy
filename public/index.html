<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>CORE AI · Intelligent Assistant</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- reCAPTCHA -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- Chart.js pour les graphiques -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    /* ============================================
       VARIABLES GLOBALES
    ============================================ */
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #dbeafe;
      --primary-very-light: #eff6ff;
      --secondary: #7c3aed;
      --secondary-light: #a78bfa;
      --accent: #06b6d4;
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-sidebar: #ffffff;
      --bg-dark: #111111;
      --bg-dark-secondary: #1a1a1a;
      --text-primary: #000000;
      --text-secondary: #4b5563;
      --text-dark: #f9f9f9;
      --border-light: #e2e8f0;
      --border-dark: #2d2d2d;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.03);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.05);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
      --mic-active: #ef4444;
      --mic-inactive: #6b7280;
      --mic-speaking: #2563eb;
      --search-loader: #3b82f6;
      --tag-web: #2563eb;
      --tag-deep: #7c3aed;
      
      --mobile: 480px;
      --tablet: 768px;
      --laptop: 1024px;
      --desktop: 1280px;
      --ultrawide: 1600px;
      --sidebar-width: 280px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body, html {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      height: 100dvh;
      overflow: hidden;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* Mode sombre */
    body.dark {
      background: var(--bg-dark);
      color: var(--text-dark);
    }
    
    body.dark .bg-white {
      background: var(--bg-dark-secondary);
    }
    
    body.dark .bg-gray-50 {
      background: var(--bg-dark);
    }
    
    body.dark .border-gray-200,
    body.dark .border-gray-300 {
      border-color: var(--border-dark);
    }
    
    body.dark .text-gray-600 {
      color: #a0a0a0;
    }
    
    body.dark input, 
    body.dark select, 
    body.dark textarea {
      background: var(--bg-dark-secondary);
      border-color: var(--border-dark);
      color: var(--text-dark);
    }
    
    body.dark input::placeholder, 
    body.dark textarea::placeholder {
      color: #a0a0a0;
    }

    /* ============================================
       ANIMATION D'INTRO
    ============================================ */
    .intro-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #2563eb, #7c3aed, #06b6d4);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: introFadeOut 0.8s ease 4s forwards;
      pointer-events: none;
    }

    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 20%),
                  radial-gradient(circle at 80% 70%, rgba(255,255,255,0.15) 0%, transparent 20%),
                  radial-gradient(circle at 40% 80%, rgba(255,255,255,0.15) 0%, transparent 20%),
                  radial-gradient(circle at 90% 20%, rgba(255,255,255,0.15) 0%, transparent 20%);
      animation: particleMove 20s infinite linear;
    }

    @keyframes particleMove {
      0% { transform: scale(1) rotate(0deg); opacity: 0.3; }
      50% { transform: scale(1.2) rotate(5deg); opacity: 0.6; }
      100% { transform: scale(1) rotate(0deg); opacity: 0.3; }
    }

    .intro-content {
      position: relative;
      z-index: 10;
      text-align: center;
    }

    .core-title {
      font-family: 'Space Grotesk', monospace;
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 700;
      color: white;
      text-shadow: 0 0 30px rgba(255,255,255,0.5);
      margin-bottom: 20px;
      letter-spacing: 4px;
    }

    .core-title span {
      display: inline-block;
      opacity: 0;
      transform: translateY(20px);
      animation: letterAppear 0.1s ease forwards;
      text-shadow: 0 0 30px currentColor;
    }

    .core-title span:nth-child(1) { animation-delay: 0.1s; }
    .core-title span:nth-child(2) { animation-delay: 0.2s; }
    .core-title span:nth-child(3) { animation-delay: 0.3s; }
    .core-title span:nth-child(4) { animation-delay: 0.4s; }
    .core-title span:nth-child(5) { animation-delay: 0.5s; }
    .core-title span:nth-child(6) { animation-delay: 0.6s; }
    .core-title span:nth-child(7) { animation-delay: 0.7s; }
    .core-title span:nth-child(8) { animation-delay: 0.8s; }

    @keyframes letterAppear {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .robot-container {
      margin-top: 30px;
      opacity: 0;
      transform: translateY(30px);
      animation: robotAppear 0.5s ease 2s forwards;
    }

    .robot {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border-radius: 40% 40% 30% 30%;
      position: relative;
      margin: 0 auto;
      border: 2px solid rgba(255,255,255,0.5);
      box-shadow: 0 0 30px rgba(37, 99, 235, 0.5), 0 0 30px rgba(124, 58, 237, 0.5), 0 0 30px rgba(6, 182, 212, 0.5);
      animation: robotBounce 2s infinite ease-in-out;
    }

    .robot-eyes {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding-top: 25px;
    }

    .eye {
      width: 15px;
      height: 15px;
      background: white;
      border-radius: 50%;
      animation: blink 3s infinite;
    }

    .robot-mouth {
      width: 30px;
      height: 4px;
      background: white;
      margin: 15px auto 0;
      border-radius: 2px;
    }

    .robot-arm {
      position: absolute;
      width: 20px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.5);
      top: 20px;
    }

    .arm-left {
      left: -15px;
      border-radius: 10px 0 0 10px;
      transform: rotate(10deg);
      animation: waveLeft 2s infinite;
    }

    .arm-right {
      right: -15px;
      border-radius: 0 10px 10px 0;
      transform: rotate(-10deg);
      animation: waveRight 2s infinite;
    }

    @keyframes waveLeft {
      0%, 100% { transform: rotate(10deg); }
      50% { transform: rotate(20deg); }
    }

    @keyframes waveRight {
      0%, 100% { transform: rotate(-10deg); }
      50% { transform: rotate(-20deg); }
    }

    @keyframes robotAppear {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes robotBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes blink {
      0%, 48%, 52%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.1); }
    }

    @keyframes introFadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }

    /* ============================================
       LAYOUT PRINCIPAL
    ============================================ */
    .app-container {
      display: flex;
      height: 100dvh;
      width: 100%;
      max-width: 100vw;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      animation: appAppear 0.6s ease 4.2s forwards;
    }

    @keyframes appAppear {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ============================================
       SIDEBAR GAUCHE
    ============================================ */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: var(--sidebar-width);
      height: 100dvh;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      gap: 24px;
      transform: translateX(calc(-1 * var(--sidebar-width) - 20px));
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      z-index: 1000;
      box-shadow: var(--shadow-lg);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      font-family: 'Space Grotesk', monospace;
      font-size: 1.5rem;
      font-weight: 600;
      background: linear-gradient(135deg, #2563eb, #7c3aed, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border-light);
    }

    .sidebar-menu {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: none;
      background: transparent;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
      width: 100%;
    }

    .sidebar-btn i {
      width: 20px;
      color: var(--primary);
      font-size: 16px;
    }

    .sidebar-btn:hover {
      background: var(--bg-secondary);
      transform: translateX(4px);
      box-shadow: var(--shadow-md);
    }

    .sidebar-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .sidebar-btn.active i {
      color: white;
    }

    .quick-actions-section {
      margin-top: auto;
      padding-top: 24px;
      border-top: 1px solid var(--border-light);
    }

    .quick-actions-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .quick-action-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .quick-action-btn:hover {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border-color: transparent;
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    /* Overlay pour fermer la sidebar */
    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(3px);
      z-index: 999;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .sidebar-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    /* ============================================
       BOUTON TOGGLE SIDEBAR
    ============================================ */
    .sidebar-toggle {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: white;
      border: 1px solid var(--border-light);
      color: var(--primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: var(--shadow-md);
      z-index: 1001;
      transition: all 0.2s ease;
    }

    .sidebar-toggle:hover {
      background: var(--primary-light);
      transform: scale(1.05);
    }

    /* ============================================
       ZONE PRINCIPALE
    ============================================ */
    .main-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      -webkit-overflow-scrolling: touch;
      background: var(--bg-secondary);
      margin-left: 0;
      transition: margin-left 0.3s ease;
      width: 100%;
      height: 100dvh;
      padding-bottom: 0;
    }

    /* ============================================
       SUGGESTIONS INITIALES
    ============================================ */
    .suggestions-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px 16px;
      width: 100%;
      max-width: 780px;
      margin: 0 auto;
    }

    .welcome-title {
      font-size: clamp(2rem, 6vw, 2.5rem) !important;
      font-weight: 600;
      margin-bottom: clamp(30px, 6vh, 40px);
      text-align: center;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.3 !important;
    }

    .suggestions-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 0 12px;
    }

    @media (min-width: 640px) {
      .suggestions-grid {
        gap: 16px;
      }
    }

    .suggestion-btn {
      padding: 14px 16px;
      background: white;
      border: 1px solid var(--border-light);
      border-radius: 40px;
      font-size: 15px !important;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      white-space: nowrap;
      line-height: 1.5 !important;
    }

    @media (min-width: 768px) {
      .suggestion-btn {
        padding: 16px 24px;
        font-size: 16px !important;
      }
    }

    body.dark .suggestion-btn {
      background: var(--bg-dark-secondary);
      color: var(--text-dark);
      border-color: var(--border-dark);
    }

    .suggestion-btn:hover {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .suggestion-btn i {
      color: var(--primary);
      font-size: 16px;
    }

    /* ============================================
       TAGS DE MODE ACTIF
    ============================================ */
    .active-tags {
      max-width: 780px;
      margin: 0 auto 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-start;
      padding: 0 16px;
    }

    .mode-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px 6px 12px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      color: white;
      cursor: default;
      box-shadow: var(--shadow-sm);
      animation: tagAppear 0.3s ease;
    }

    @keyframes tagAppear {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    .mode-tag.web {
      background: var(--tag-web);
    }

    .mode-tag.deep {
      background: var(--tag-deep);
    }

    .mode-tag i {
      font-size: 12px;
      cursor: pointer;
      padding: 4px;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .mode-tag i:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.1);
    }

    /* ============================================
       CONVERSATION AREA
    ============================================ */
    .conversation-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 24px 16px;
      scroll-behavior: smooth;
      display: flex;
      flex-direction: column;
      width: 100%;
      background: var(--bg-secondary);
      height: auto !important;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain !important;
    }

    .messages-wrapper {
      width: 100%;
      max-width: 780px !important;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
      min-width: 0;
      padding: 16px !important;
    }

    @media (min-width: 1024px) {
      .messages-wrapper {
        max-width: 780px !important;
        padding: 20px !important;
      }
    }

    /* Animation fade-in */
    @keyframes messageFadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Structure de message */
    .message {
      display: flex;
      flex-direction: column;
      width: 100%;
      animation: messageFadeIn 0.3s ease;
      min-width: 0;
      max-width: 75% !important;
      margin-bottom: 20px !important;
    }

    .message.user {
      align-items: flex-end;
      margin-left: auto;
    }

    .message.assistant {
      align-items: flex-start;
      margin-right: auto;
    }

    /* Avatar */
    .message-avatar {
      width: 30px;
      height: 30px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-bottom: 8px;
    }

    .message.user .message-avatar {
      background: var(--primary);
      color: white;
      border-radius: 4px;
    }

    .message.assistant .message-avatar {
      background: transparent;
      color: var(--primary);
      font-size: 18px;
    }

    /* ============================================
       BULLE UTILISATEUR
    ============================================ */
    .message.user .message-content {
      max-width: 100% !important;
      width: fit-content;
      min-width: 60px;
      align-self: flex-end;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 12px 16px !important;
      border-radius: 18px 18px 4px 18px !important;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
      margin: 0;
      line-height: 1.6 !important;
      font-size: 15px !important;
      word-break: break-word;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    /* ============================================
       BULLE ASSISTANT - STYLE OPTIMISÉ
    ============================================ */
    .message.assistant .message-content {
      max-width: 100% !important;
      width: 100%;
      padding: 0;
      line-height: 1.6 !important;
      font-size: 15px !important;
      word-break: break-word;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      display: block;
      color: var(--text-primary);
    }

    /* ============================================
       FORMATAGE DU CONTENU - AVEC TABLEAUX
    ============================================ */
    .message.assistant .message-content .chat-response {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 15px !important;
      line-height: 1.6 !important;
      letter-spacing: 0.2px;
      width: 100%;
    }

    .message.assistant .message-content .chat-response,
    .message.assistant .message-content .chat-response * {
      color: #000000 !important;
    }

    /* STYLES POUR TABLEAUX - NOUVEAU */
    .message.assistant .message-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 15px 0;
      font-size: 14px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .message.assistant .message-content thead tr {
      background: var(--primary);
      color: white;
    }

    .message.assistant .message-content th {
      padding: 12px 10px;
      text-align: left;
      font-weight: 600;
    }

    .message.assistant .message-content td {
      padding: 10px;
      border-bottom: 1px solid var(--border-light);
    }

    .message.assistant .message-content tbody tr:hover {
      background: var(--primary-very-light);
    }

    .message.assistant .message-content tbody tr:last-child td {
      border-bottom: none;
    }

    /* Titres */
    .message.assistant .message-content .chat-response h1 {
      font-size: 24px !important;
      font-weight: 700 !important;
      margin: 28px 0 16px 0 !important;
      line-height: 1.3 !important;
      border-bottom: 2px solid #e2e8f0 !important;
      padding-bottom: 8px !important;
    }

    .message.assistant .message-content .chat-response h2 {
      font-size: 22px !important;
      font-weight: 700 !important;
      margin: 24px 0 14px 0 !important;
      line-height: 1.3 !important;
      border-bottom: 2px solid #e2e8f0 !important;
      padding-bottom: 6px !important;
    }

    .message.assistant .message-content .chat-response h3 {
      font-size: 20px !important;
      font-weight: 600 !important;
      margin: 20px 0 12px 0 !important;
      line-height: 1.4 !important;
    }

    .message.assistant .message-content .chat-response h4 {
      font-size: 18px !important;
      font-weight: 600 !important;
      margin: 18px 0 10px 0 !important;
      line-height: 1.4 !important;
      font-style: italic;
    }

    /* Paragraphes */
    .message.assistant .message-content .chat-response p {
      margin: 0 0 16px 0 !important;
      line-height: 1.6 !important;
      font-size: 15px !important;
    }

    .message.assistant .message-content .chat-response p:last-child {
      margin-bottom: 0 !important;
    }

    /* Listes */
    .message.assistant .message-content .chat-response ul,
    .message.assistant .message-content .chat-response ol {
      margin: 12px 0 20px 24px !important;
      padding-left: 0 !important;
      line-height: 1.6 !important;
    }

    .message.assistant .message-content .chat-response li {
      margin-bottom: 8px !important;
      line-height: 1.6 !important;
      list-style-type: disc !important;
      font-size: 15px !important;
    }

    .message.assistant .message-content .chat-response li:last-child {
      margin-bottom: 0 !important;
    }

    .message.assistant .message-content .chat-response li strong {
      color: #000000 !important;
      font-weight: 600 !important;
    }

    /* Code */
    .message.assistant .message-content .chat-response code {
      font-size: 14px !important;
      line-height: 1.5 !important;
      background: #f1f5f9 !important;
      padding: 2px 6px !important;
      border-radius: 4px !important;
      font-family: 'SF Mono', 'Fira Code', monospace !important;
    }

    .message.assistant .message-content .chat-response pre {
      background: #f8fafc !important;
      padding: 16px !important;
      border-radius: 8px !important;
      overflow-x: auto !important;
      margin: 16px 0 !important;
      border: 1px solid #e2e8f0 !important;
      line-height: 1.5 !important;
      font-size: 14px !important;
    }

    .message.assistant .message-content .chat-response pre code {
      background: transparent !important;
      padding: 0 !important;
      font-size: 14px !important;
    }

    /* Pied de message */
    .message-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
      font-size: 13px !important;
      line-height: 1.4 !important;
      color: var(--text-secondary);
    }

    .message.user .message-footer {
      justify-content: flex-end;
    }

    .copy-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px 8px !important;
      border-radius: 6px;
      transition: all 0.2s;
      opacity: 0.6;
      font-size: 12px !important;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: 8px !important;
    }

    .copy-btn:hover {
      opacity: 1;
      color: var(--primary);
      background: var(--primary-light);
    }

    body.dark .copy-btn:hover {
      background: rgba(37, 99, 235, 0.2);
    }

    /* ============================================
       TYPING INDICATOR
    ============================================ */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 0;
      font-style: italic;
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.6;
    }

    .typing-dots {
      display: inline-flex;
      gap: 4px;
    }

    .typing-dots span {
      width: 4px;
      height: 4px;
      background: var(--text-secondary);
      border-radius: 50%;
      display: inline-block;
      animation: blink 1.4s infinite;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* ============================================
       SEARCH LOADER
    ============================================ */
    .search-loader {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: white;
      border: 1px solid var(--border-light);
      border-radius: 40px;
      box-shadow: var(--shadow-sm);
      font-size: 14px;
      line-height: 1.5;
    }

    .search-loader span {
      width: 6px;
      height: 6px;
      background: var(--primary);
      border-radius: 50%;
      display: inline-block;
      animation: searchPulse 1.4s infinite;
    }

    .search-loader span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .search-loader span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes searchPulse {
      0%, 100% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    body.dark .search-loader {
      background: var(--bg-dark-secondary);
      border-color: var(--border-dark);
    }

    body.dark .search-loader span {
      background: var(--primary-light);
    }

    /* ============================================
       BARRE DE SAISIE RESPONSIVE OPTIMISÉE
    ============================================ */
    .input-section {
      border-top: 1px solid var(--border-light);
      padding: 12px 16px 20px !important;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      flex-shrink: 0;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      width: 100%;
      z-index: 10;
    }

    body.dark .input-section {
      background: rgba(26, 26, 26, 0.95);
      border-top-color: var(--border-dark);
    }

    .input-container {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: white;
      border: 1px solid var(--border-light);
      border-radius: 24px;
      padding: 8px 8px 8px 16px;
      box-shadow: var(--shadow-md);
      transition: all 0.2s ease;
      width: 100%;
      min-height: 56px;
    }

    body.dark .input-container {
      background: var(--bg-dark-secondary);
      border-color: var(--border-dark);
    }

    .input-container:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .plus-button {
      width: 44px !important;
      height: 44px !important;
      min-width: 44px !important;
      min-height: 44px !important;
      border-radius: 30px !important;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px !important;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      flex-shrink: 0;
    }

    .plus-button:hover {
      transform: scale(1.1) rotate(90deg);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
    }

    .floating-menu {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-light);
      overflow: hidden;
      z-index: 100;
      min-width: 200px;
      max-width: 90vw;
    }

    body.dark .floating-menu {
      background: var(--bg-dark-secondary);
      border-color: var(--border-dark);
    }

    .menu-item {
      padding: 14px 18px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .menu-item:hover {
      background: var(--primary-light);
      color: var(--primary-dark);
    }

    body.dark .menu-item:hover {
      background: rgba(37, 99, 235, 0.2);
    }

    .menu-item i {
      width: 18px;
      color: var(--primary);
    }

    .textarea-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      min-width: 0;
    }

    #messageInput {
      width: 100%;
      padding: 10px 0 !important;
      border: none;
      background: transparent;
      font-size: 16px !important;
      line-height: 1.5 !important;
      min-height: 24px;
      max-height: 150px !important;
      resize: none;
      outline: none;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      transition: height 0.1s ease;
    }

    #messageInput::placeholder {
      color: var(--text-secondary);
      font-size: 15px;
      opacity: 0.8;
    }

    /* Bouton stop */
    .stop-button {
      width: 44px !important;
      height: 44px !important;
      min-width: 44px !important;
      min-height: 44px !important;
      border-radius: 30px !important;
      background: #f1f1f1;
      color: #333;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px !important;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    body.dark .stop-button {
      background: #2d2d2d;
      color: #f0f0f0;
    }

    .stop-button:hover {
      background: #e0e0e0;
      transform: scale(1.05);
    }

    .send-button {
      width: 44px !important;
      height: 44px !important;
      min-width: 44px !important;
      min-height: 44px !important;
      border-radius: 24px !important;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px !important;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
      flex-shrink: 0;
    }

    .send-button:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
    }

    .send-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
      background: #9ca3af;
    }

    /* ============================================
       BOUTON MICRO
    ============================================ */
    .mic-button {
      width: 44px !important;
      height: 44px !important;
      min-width: 44px !important;
      min-height: 44px !important;
      border-radius: 24px !important;
      background: white;
      border: 1px solid var(--border-light);
      color: var(--mic-inactive);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px !important;
      flex-shrink: 0;
    }

    .mic-button:hover {
      background: var(--primary-light);
      border-color: var(--primary);
    }

    .mic-button.listening {
      animation: pulse-pro 1.5s infinite !important;
      background: #ff3b3b !important;
      color: white !important;
      border-color: #ff3b3b !important;
    }

    .mic-button.speaking {
      color: var(--mic-speaking);
      animation: pulse 1.5s infinite;
      border-color: var(--mic-speaking);
    }

    .mic-button.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .mic-button.permission-denied {
      background: #fee2e2;
      border-color: #ef4444;
      color: #ef4444;
      cursor: not-allowed;
    }

    body.dark .mic-button.permission-denied {
      background: rgba(239, 68, 68, 0.2);
    }

    @keyframes pulse-pro {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.6);
      }
      70% {
        box-shadow: 0 0 0 12px rgba(255, 59, 59, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(255, 59, 59, 0);
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);
      }
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
      }
    }

    /* Statut vocal */
    .voice-status {
      max-width: 780px;
      margin: 4px auto 0;
      font-size: 13px;
      color: var(--text-secondary);
      padding: 0 16px;
      min-height: 20px;
      transition: all 0.3s ease;
    }

    body.dark .voice-status {
      color: #a0a0a0;
    }

    /* ============================================
       MODE SELECTOR
    ============================================ */
    .mode-selector-wrapper {
      max-width: 780px;
      margin: 0 auto;
      width: 100%;
      padding: 8px 16px 0;
      display: flex;
      justify-content: center;
    }

    .mode-selector {
      display: flex;
      background: white;
      border-radius: 40px;
      padding: 4px;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
      width: fit-content;
    }

    body.dark .mode-selector {
      background: var(--bg-dark-secondary);
      border-color: var(--border-dark);
    }

    .mode-btn {
      padding: 8px 24px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      color: var(--text-primary);
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .mode-btn {
        padding: 6px 16px;
        font-size: 13px;
      }
    }

    .mode-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    .mode-btn:not(.active):hover {
      background: var(--primary-light);
      color: var(--primary-dark);
    }

    /* ============================================
       BOUTON SCROLL TO BOTTOM
    ============================================ */
    .scroll-to-bottom-btn {
      position: fixed;
      bottom: 100px;
      right: 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 40px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      cursor: pointer;
      z-index: 100;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: slideIn 0.3s ease;
    }

    .scroll-to-bottom-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
    }

    .scroll-to-bottom-btn i {
      font-size: 12px;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mode sombre pour le bouton scroll */
    body.dark .scroll-to-bottom-btn {
      background: var(--primary-dark);
      color: white;
      border-color: rgba(255, 255, 255, 0.1);
    }

    /* ============================================
       MODE PROPOSAL
    ============================================ */
    #proposalMode {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px;
      overflow-y: auto;
      flex: 1;
    }

    .proposal-form {
      background: white;
      border-radius: 16px;
      border: 1px solid var(--border-light);
      padding: 24px;
      box-shadow: var(--shadow-sm);
    }

    body.dark .proposal-form {
      background: var(--bg-dark-secondary);
      border-color: var(--border-dark);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    @media (min-width: 640px) {
      .form-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-light);
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      background: white;
      transition: all 0.2s;
      color: var(--text-primary);
    }

    body.dark .form-input,
    body.dark .form-select,
    body.dark .form-textarea {
      background: var(--bg-dark);
      border-color: var(--border-dark);
      color: var(--text-dark);
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .example-chip {
      background: #f3f4f6;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      color: var(--text-primary);
      line-height: 1.5;
    }

    body.dark .example-chip {
      background: var(--bg-dark);
      color: var(--text-dark);
    }

    .example-chip:hover {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary-dark);
    }

    .recaptcha-wrapper {
      display: flex;
      justify-content: center;
      margin: 20px 0;
      transform: scale(0.85);
    }

    @media (min-width: 480px) {
      .recaptcha-wrapper {
        transform: scale(1);
      }
    }

    .generate-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 15px;
      line-height: 1.5;
    }

    .generate-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2);
    }

    .history-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-primary);
      line-height: 1.6;
    }

    body.dark .history-item {
      background: var(--bg-dark);
      border-color: var(--border-dark);
      color: var(--text-dark);
    }

    .history-item:hover {
      border-color: var(--primary);
      transform: translateX(4px);
    }

    .char-count-warning {
      color: #f59e0b !important;
    }
    
    .char-count-danger {
      color: #ef4444 !important;
    }
    
    .char-count-normal {
      color: var(--text-secondary) !important;
    }

    .hidden {
      display: none !important;
    }

    @supports not (backdrop-filter: blur(10px)) {
      .input-section {
        background: rgba(255, 255, 255, 0.95);
      }
      body.dark .input-section {
        background: rgba(26, 26, 26, 0.95);
      }
    }

    @media screen and (-webkit-min-device-pixel-ratio: 0) { 
      select, textarea, input {
        font-size: 16px !important;
      }
    }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: var(--shadow-lg);
      z-index: 9999;
      animation: slideUp 0.3s ease;
      border-left: 4px solid var(--primary);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translate(-50%, 20px);
      }
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: translate(-50%, -10px);
      }
    }

    /* ============================================
       MODE SOMBRE - AMÉLIORATIONS TYPOGRAPHIQUES
    ============================================ */
    body.dark .message.assistant .message-content .chat-response {
      color: #f0f0f0 !important;
    }

    body.dark .message.assistant .message-content .chat-response h1,
    body.dark .message.assistant .message-content .chat-response h2,
    body.dark .message.assistant .message-content .chat-response h3,
    body.dark .message.assistant .message-content .chat-response h4 {
      color: #ffffff !important;
      border-bottom-color: #444 !important;
    }

    body.dark .message.assistant .message-content .chat-response code {
      background: #2d2d2d !important;
      color: #e0e0e0 !important;
    }

    body.dark .message.assistant .message-content .chat-response pre {
      background: #1a1a1a !important;
      border-color: #444 !important;
    }

    body.dark .message.assistant .message-content .chat-response hr {
      border-top-color: #444 !important;
    }

    /* MODE SOMBRE POUR TABLEAUX */
    body.dark .message.assistant .message-content td {
      border-bottom-color: var(--border-dark);
    }

    body.dark .message.assistant .message-content tbody tr:hover {
      background: rgba(37, 99, 235, 0.1);
    }

    body.dark .input-section {
      background: rgba(26, 26, 26, 0.95);
      border-top-color: var(--border-dark);
    }

    body.dark .input-container {
      background: var(--bg-dark-secondary);
      border-color: var(--border-dark);
    }

    body.dark #messageInput {
      color: var(--text-dark);
    }

    body.dark #messageInput::placeholder {
      color: #a0a0a0;
    }

    /* ============================================
       AMÉLIORATIONS DE LECTURE
    ============================================ */
    .message.assistant .message-content .chat-response strong {
      font-weight: 600 !important;
    }

    .message.assistant .message-content .chat-response em {
      font-style: italic !important;
    }

    .message.assistant .message-content .chat-response hr {
      margin: 24px 0 !important;
      border: none !important;
      border-top: 1px solid var(--border-light) !important;
    }

    .message.assistant .message-content .chat-response h1:first-child,
    .message.assistant .message-content .chat-response h2:first-child,
    .message.assistant .message-content .chat-response h3:first-child,
    .message.assistant .message-content .chat-response h4:first-child {
      margin-top: 0 !important;
    }

    /* ============================================
       RESPONSIVE MOBILE OPTIMISÉ
    ============================================ */
    @media (max-width: 768px) {
      .sidebar-toggle {
        display: flex;
      }
      
      .input-container {
        gap: 6px;
        min-height: 52px;
        padding: 6px 6px 6px 14px;
      }
      
      .messages-wrapper {
        gap: 20px;
        padding: 12px !important;
      }
      
      .message {
        max-width: 85% !important;
        margin-bottom: 16px !important;
      }
      
      .message.assistant .message-content .chat-response h1 {
        font-size: 22px !important;
      }
      
      .message.assistant .message-content .chat-response h2 {
        font-size: 20px !important;
      }

  <script>
    // ============================================
    // CONSTANTES DE CONFIGURATION
    // ============================================
    const CONFIG = {
      CHAT: {
        MAX_HISTORY_MESSAGES: 20,
        MAX_INPUT_LINES: 5,
        LINE_HEIGHT: 24,
        TYPING_SPEED_MS: 15,
        SCROLL_DELAY_MS: 50,
        MAX_STORED_MESSAGES: 50
      },
      PROPOSAL: {
        MAX_CHARS: 500,
        HISTORY_LIMIT: 5,
        WARNING_THRESHOLD: 450,
        DANGER_THRESHOLD: 490
      }
    };

    // ============================================
    // VARIABLES GLOBALES
    // ============================================
    let chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];
    let currentMode = 'chat';
    let isTypingEffectActive = false;
    let isSending = false;
    let isSearching = false;
    let resizeTimeout;
    
    const messageIds = new Set();
    
    let recognition = null;
    let isListening = false;
    let isSpeaking = false;
    let synth = window.speechSynthesis;
    let utterance = null;

    let autoScrollEnabled = true;
    let isUserScrolling = false;
    let scrollTimeout;
    const SCROLL_THRESHOLD = 80;
    let scrollButton = null;
    let resizeObserver = null;

    const stopButton = document.getElementById('stopButton');
    const voiceStatus = document.getElementById('voiceStatus');
    let finalTranscript = '';

    // ============================================
    // RECONNAISSANCE VOCALE
    // ============================================
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      recognition.maxAlternatives = 1;
      
      recognition.onstart = function() {
        isListening = true;
        updateMicButton();
        micButton.classList.add('listening');
        stopButton.style.display = 'flex';
        voiceStatus.innerText = '🎤 Listening...';
        input.classList.add('listening');
      };
      
      recognition.onresult = function(event) {
        let interimTranscript = '';
        
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalTranscript += transcript + ' ';
          } else {
            interimTranscript += transcript;
          }
        }
        
        input.value = finalTranscript + interimTranscript;
        
        if (input.value.trim() !== '') {
          sendBtn.disabled = false;
        }
        
        handleInput();
        smartScroll();
      };
      
      recognition.onspeechend = function() {
        voiceStatus.innerText = '⏳ Transcribing...';
      };
      
      recognition.onend = function() {
        isListening = false;
        updateMicButton();
        micButton.classList.remove('listening');
        stopButton.style.display = 'none';
        voiceStatus.innerText = '';
        input.classList.remove('listening', 'streaming');
      };
      
      recognition.onerror = function(event) {
        isListening = false;
        updateMicButton();
        micButton.classList.remove('listening');
        stopButton.style.display = 'none';
        input.classList.remove('listening', 'streaming');
        
        let errorMessage = '❌ Micro error';
        switch(event.error) {
          case 'no-speech':
            errorMessage = '❌ No speech detected';
            voiceStatus.innerText = '❌ No speech detected';
            break;
          case 'audio-capture':
            errorMessage = '❌ No microphone found';
            voiceStatus.innerText = '❌ No microphone found';
            break;
          case 'not-allowed':
            errorMessage = '❌ Microphone access denied';
            voiceStatus.innerText = '❌ Microphone access denied';
            break;
          case 'network':
            errorMessage = '❌ Network error';
            voiceStatus.innerText = '❌ Network error';
            break;
          default:
            errorMessage = `❌ Error: ${event.error}`;
            voiceStatus.innerText = `❌ Error: ${event.error}`;
        }
        
        showToast(errorMessage, true);
        console.error('Speech recognition error:', event);
        
        setTimeout(() => {
          voiceStatus.innerText = '';
        }, 3000);
      };
    }

    // ============================================
    // FONCTIONS EXISTANTES (conservées intactes)
    // ============================================
    function detectDomain(message) {
      const msg = message.toLowerCase();
      if (msg.match(/code|javascript|html|css|bug|api|program|function|variable|react|vue|angular|node|python|java|php|sql|database/i)) return "programming";
      if (msg.match(/price|client|proposal|freelance|contract|invoice|payment|budget|cost|quote|estimate|negotiation|client|business|startup|company|market/i)) return "business";
      if (msg.match(/marketing|sell|ads|growth|seo|social media|content|brand|audience|lead|conversion|traffic|campaign|promotion/i)) return "marketing";
      if (msg.match(/write|text|grammar|email|content|article|blog|copy|edit|proofread|story|script|creative|writer/i)) return "writing";
      if (msg.match(/focus|time|productivity|organize|task|todo|schedule|calendar|efficiency|workflow|gtd|priority|deadline/i)) return "productivity";
      if (msg.match(/science|physics|biology|chemistry|math|research|lab|experiment|theory|scientific|data|analysis|statistics/i)) return "science";
      return "general";
    }

    function buildContext(messages, maxMessages = 15) {
      return messages.slice(-maxMessages);
    }

    function processInlineFormatting(text) {
      if (!text) return '';
      let processed = text;
      processed = processed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      processed = processed.replace(/__(.*?)__/g, '<strong>$1</strong>');
      processed = processed.replace(/\*(.*?)\*/g, '<em>$1</em>');
      processed = processed.replace(/_(.*?)_/g, '<em>$1</em>');
      processed = processed.replace(/\+\+(.*?)\+\+/g, '<u>$1</u>');
      processed = processed.replace(/~~(.*?)~~/g, '<del>$1</del>');
      processed = processed.replace(/`(.*?)`/g, '<code>$1</code>');
      processed = processed.replace(/==(.*?)==/g, '<mark>$1</mark>');
      processed = processed.replace(/:([a-zA-Z0-9_+-]+):/g, '<span class="emoji">:$1:</span>');
      return processed;
    }

    function formatMarkdown(text) {
      if (!text) return '';
      let formatted = text;
      const lines = formatted.split('\n');
      let inCodeBlock = false;
      let inList = false;
      let listType = null;
      let result = [];
      
      for (let i = 0; i < lines.length; i++) {
        let line = lines[i];
        
        if (line.trim().startsWith('```')) {
          if (!inCodeBlock) {
            if (inList) { result.push(`</${listType}>`); inList = false; }
            result.push('<pre><code>');
            inCodeBlock = true;
          } else {
            result.push('</code></pre>');
            inCodeBlock = false;
          }
          continue;
        }
        
        if (inCodeBlock) {
          const escapedLine = line
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
          result.push(escapedLine);
          continue;
        }
        
        if (line.startsWith('# ')) {
          if (inList) { result.push(`</${listType}>`); inList = false; }
          result.push(`<h1>${line.substring(2)}</h1>`);
        }
        else if (line.startsWith('## ')) {
          if (inList) { result.push(`</${listType}>`); inList = false; }
          result.push(`<h2>${line.substring(3)}</h2>`);
        }
        else if (line.startsWith('### ')) {
          if (inList) { result.push(`</${listType}>`); inList = false; }
          result.push(`<h3>${line.substring(4)}</h3>`);
        }
        else if (line.startsWith('#### ')) {
          if (inList) { result.push(`</${listType}>`); inList = false; }
          result.push(`<h4>${line.substring(5)}</h4>`);
        }
        else if (line.match(/^[-•*] (.*)$/)) {
          const content = line.replace(/^[-•*] /, '');
          if (!inList || listType !== 'ul') {
            if (inList) result.push(`</${listType}>`);
            result.push('<ul>');
            inList = true;
            listType = 'ul';
          }
          result.push(`<li>${processInlineFormatting(content)}</li>`);
        }
        else if (line.match(/^\d+\. (.*)$/)) {
          const content = line.replace(/^\d+\. /, '');
          if (!inList || listType !== 'ol') {
            if (inList) result.push(`</${listType}>`);
            result.push('<ol>');
            inList = true;
            listType = 'ol';
          }
          result.push(`<li>${processInlineFormatting(content)}</li>`);
        }
        else if (line.match(/^---*$/)) {
          if (inList) { result.push(`</${listType}>`); inList = false; }
          result.push('<hr>');
        }
        else if (line.trim() === '') {
          if (inList) { result.push(`</${listType}>`); inList = false; }
          result.push('<br>');
        }
        else {
          if (inList) { result.push(`</${listType}>`); inList = false; }
          result.push(`<p>${processInlineFormatting(line)}</p>`);
        }
      }
      
      if (inList) {
        result.push(`</${listType}>`);
      }
      
      return `<div class="chat-response">${result.join('\n')}</div>`;
    }

    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      localStorage.setItem('darkMode', document.body.classList.contains('dark'));
      const icon = document.querySelector('.fa-moon');
      if (document.body.classList.contains('dark')) {
        icon.classList.remove('fa-moon');
        icon.classList.add('fa-sun');
      } else {
        icon.classList.remove('fa-sun');
        icon.classList.add('fa-moon');
      }
    }

    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
      document.querySelector('.fa-moon').classList.add('fa-sun');
      document.querySelector('.fa-moon').classList.remove('fa-moon');
    }

    function switchMode(mode) {
      const chatBtn = document.getElementById('modeChat');
      const proposalBtn = document.getElementById('modeProposal');
      const suggestions = document.getElementById('suggestionsSection');
      const conversation = document.getElementById('conversationArea');
      const proposal = document.getElementById('proposalMode');
      
      if (mode === 'chat') {
        chatBtn.classList.add('active');
        proposalBtn.classList.remove('active');
        suggestions.style.display = 'flex';
        conversation.style.display = 'flex';
        proposal.classList.add('hidden');
        currentMode = 'chat';
      } else {
        chatBtn.classList.remove('active');
        proposalBtn.classList.add('active');
        suggestions.style.display = 'none';
        conversation.style.display = 'none';
        proposal.classList.remove('hidden');
        currentMode = 'proposal';
      }
    }

    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const suggestionsSection = document.getElementById('suggestionsSection');
    const conversationArea = document.getElementById('conversationArea');
    const messagesWrapper = document.getElementById('messagesWrapper');
    const suggestionsContainer = document.getElementById('suggestionsContainer');
    const micButton = document.getElementById('micButton');
    const activeTags = document.getElementById('activeTags');

    function autoResize() {
      if (resizeTimeout) clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        input.style.height = 'auto';
        const maxHeight = 150;
        const newHeight = Math.min(input.scrollHeight, maxHeight);
        input.style.height = newHeight + 'px';
        input.style.overflowY = input.scrollHeight > maxHeight ? 'auto' : 'hidden';
        resizeTimeout = null;
      }, 10);
    }

    function handleInput() {
      if (input.value.trim() !== '') {
        sendBtn.disabled = false;
      } else {
        sendBtn.disabled = true;
      }
      autoResize();
      if (input.value.trim() !== '') {
        suggestionsContainer?.classList.add('hidden');
      }
      if (input.value.trim() !== '' && !suggestionsSection.classList.contains('hidden')) {
        suggestionsSection.classList.add('hidden');
        conversationArea.classList.remove('hidden');
      }
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter') {
        if (e.shiftKey) {
          return;
        } else {
          const message = input.value.trim();
          if (message !== '') {
            e.preventDefault();
            if (!isSending && !isTypingEffectActive && !isSearching) {
              sendMessage();
            }
          }
        }
      }
    }

    async function performUniversalSearch(query) {
      if (!query || isSearching) return;
      isSearching = true;
      
      const searchLoader = document.createElement('div');
      searchLoader.className = 'message assistant';
      searchLoader.id = 'searchLoader';
      searchLoader.innerHTML = `
        <div class="message-avatar">
          <i class="fas fa-search"></i>
        </div>
        <div class="message-content">
          <div class="search-loader">
            <span></span><span></span><span></span>
            <span style="margin-left: 8px;">Recherche en cours...</span>
          </div>
        </div>
      `;
      messagesWrapper.appendChild(searchLoader);
      smartScroll();
      
      try {
        const response = await fetch('/api/searchUnified', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });
        
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        
        const data = await response.json();
        document.getElementById('searchLoader')?.remove();
        
        if (data.reply) {
          addMessage(data.reply, 'assistant');
          if (data.suggestions) showSuggestions(data.suggestions);
        }
        
      } catch (error) {
        document.getElementById('searchLoader')?.remove();
        console.error('Search error:', error);
        addMessage("⚠️ La recherche est temporairement indisponible. Réessaie plus tard.", 'assistant');
      } finally {
        isSearching = false;
      }
    }

    function toggleVoiceInput() {
      if (!recognition) {
        showToast('❌ Voice recognition not supported in this browser', true);
        return;
      }
      
      if (isListening) {
        stopVoiceInput();
      } else {
        finalTranscript = '';
        input.value = '';
        sendBtn.disabled = true;
        
        navigator.mediaDevices.getUserMedia({ audio: true })
          .then(function(stream) {
            stream.getTracks().forEach(track => track.stop());
            try {
              recognition.start();
            } catch (error) {
              if (error.name === 'InvalidStateError') {
                recognition.stop();
                setTimeout(() => recognition.start(), 100);
              } else {
                showToast('❌ Could not start microphone', true);
              }
            }
          })
          .catch(function(err) {
            showToast('❌ Microphone access denied', true);
            micButton.classList.add('permission-denied');
          });
      }
    }

    function stopVoiceInput() {

        updateMicButton();
        micButton.classList.remove('listening');

    function speakText(text) {
      if (!synth) return;
      if (synth.speaking) {
        synth.cancel();
      }
      const cleanText = text.replace(/<[^>]*>/g, '');
      utterance = new SpeechSynthesisUtterance(cleanText);
      utterance.lang = 'en-US';
      utterance.rate = 1.0;
      utterance.pitch = 1.0;
      utterance.onstart = function() {
        isSpeaking = true;
        updateMicButton();
      };
      utterance.onend = function() {
        isSpeaking = false;
        updateMicButton();
      };
      utterance.onerror = function() {
        isSpeaking = false;
        updateMicButton();
      };
      synth.speak(utterance);
    }

    function typeWriterEffect(element, html, speed = 8) {
      return new Promise((resolve) => {
        const finalHTML = html;
        element.innerHTML = html;
        const text = element.innerText;
        element.innerHTML = "";
        let i = 0;
        function typing() {
          if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            smartScroll();
            setTimeout(typing, speed);
          } else {
            element.innerHTML = finalHTML;
            resolve();
          }
        }
        typing();
      });
    }

    }

    function addMessage(content, sender, skipHistory = false) {
      const timestamp = Date.now();
      const contentForHash = content.substring(0, 200) + sender + Math.floor(timestamp / 1000);
      let contentHash;
      
      try {
        contentHash = btoa(contentForHash).replace(/[^a-zA-Z0-9]/g, '').substring(0, 32);
      } catch (e) {
        let hash = 0;
        for (let i = 0; i < contentForHash.length; i++) {
          const char = contentForHash.charCodeAt(i);
          hash = ((hash << 5) - hash) + char;
          hash = hash & hash;
        }
        contentHash = 'hash_' + Math.abs(hash).toString(36) + '_' + timestamp;
      }
      
      if (messageIds.has(contentHash)) {
        console.log('Message identique ignoré (hash)', contentHash);
        return null;
      }
      
      messageIds.add(contentHash);
      
      if (messageIds.size > 150) {
        const idsArray = Array.from(messageIds);
        const toRemove = idsArray.slice(0, idsArray.length - 100);
        toRemove.forEach(id => messageIds.delete(id));
      }
      
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;
      messageDiv.id = `msg-${contentHash}`;
      
      const avatar = sender === 'user' 
        ? '<div class="message-avatar"><i class="fas fa-user"></i></div>'
        : '<div class="message-avatar"><i class="fas fa-robot"></i></div>';
      
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      
      let contentHTML;
      if (sender === 'assistant') {
        contentHTML = `<div class="chat-response">${content}</div>`;
      } else {
        contentHTML = `<div class="rich-text">${content.replace(/\n/g, '<br>')}</div>`;
      }
      
      messageDiv.innerHTML = `
        ${avatar}
        <div class="message-content">${contentHTML}</div>
        <div class="message-footer">
          <span>${sender === 'user' ? 'You' : 'Assistant'}</span>
          <span>•</span>
          <span>${time}</span>
        </div>
      `;
      
      messagesWrapper.appendChild(messageDiv);
      
      if (sender === 'assistant') {
        const footer = messageDiv.querySelector('.message-footer');
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.innerHTML = '<i class="far fa-copy"></i> Copy';
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(content.replace(/<[^>]*>/g, '')).then(() => {
            showToast('✓ Copied to clipboard!');
          });
        };
        footer.appendChild(copyBtn);
      }
      
      if (!skipHistory) {
        chatHistory.push({ content, sender, date: new Date() });
        if (chatHistory.length > CONFIG.CHAT.MAX_STORED_MESSAGES) {
          chatHistory = chatHistory.slice(-CONFIG.CHAT.MAX_STORED_MESSAGES);
        }
        localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
      }
      
      smartScroll();

      if (resizeObserver && messageDiv) {
        const images = messageDiv.querySelectorAll('img, pre, code');
        images.forEach(el => {
          resizeObserver.observe(el);
        });
      }
      
      return messageDiv;
    }

    function analyserDescriptionGraphique(description) {
      console.log('📊 Analyse détaillée de:', description);
      const lowerDesc = description.toLowerCase();
      
      // 1️⃣ DÉTECTION DU TYPE DE GRAPHIQUE
      let type = 'bar';
      if (lowerDesc.includes('camembert') || lowerDesc.includes('circulaire') || lowerDesc.includes('secteurs')) {
        type = 'pie';
      } else if (lowerDesc.includes('lignes') || lowerDesc.includes('courbe') || lowerDesc.includes('évolution')) {
        type = 'line';
      } else if (lowerDesc.includes('anneau') || lowerDesc.includes('doughnut')) {
        type = 'doughnut';
      } else if (lowerDesc.includes('barre') || lowerDesc.includes('colonne') || lowerDesc.includes('histogramme')) {
        type = 'bar';
      }
      
      // 2️⃣ DÉTECTION DES COULEURS
      let couleurPrincipale = '#2563eb';
      let couleurSecondaire = '#3b82f6';
      let degradation = lowerDesc.includes('dégradé') || lowerDesc.includes('dégradées');
      
      if (lowerDesc.includes('bleu')) {
        couleurPrincipale = '#1e3a8a';
        couleurSecondaire = '#93c5fd';
      } else if (lowerDesc.includes('rouge')) {
        couleurPrincipale = '#991b1b';
        couleurSecondaire = '#fca5a5';
      } else if (lowerDesc.includes('vert')) {
        couleurPrincipale = '#166534';
        couleurSecondaire = '#86efac';
      } else if (lowerDesc.includes('violet')) {
        couleurPrincipale = '#6b21a8';
        couleurSecondaire = '#d8b4fe';
      } else if (lowerDesc.includes('orange')) {
        couleurPrincipale = '#9a3412';
        couleurSecondaire = '#fdba74';
      }
      
      // 3️⃣ DÉTECTION DES ÉLÉMENTS DE STYLE
      let arrondies = lowerDesc.includes('arrondies') || lowerDesc.includes('rounded');
      let ombre = lowerDesc.includes('ombre') || lowerDesc.includes('shadow');
      let animation = lowerDesc.includes('animation') || lowerDesc.includes('progressivement');
      let titre = "Graphique";
      
      const titreMatch = description.match(/["“]([^"”]+)["”]/);
      if (titreMatch) titre = titreMatch[1];
      
      // 4️⃣ DÉTECTION DES DONNÉES
      let labels = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin"];
      let donnees = [65, 59, 80, 81, 56, 75];
      
      const dataMatch = description.match(/(\d+)[,\s]+(\d+)[,\s]+(\d+)[,\s]*(\d*)/);
      if (dataMatch) {
        donnees = dataMatch.slice(1).filter(v => v).map(v => parseInt(v));
        labels = donnees.map((_, i) => `Item ${i+1}`);
      }
      
      // 5️⃣ CRÉATION DU GRAPHIQUE
      addMessage(`📊 ${description}`, 'user');
      creerGraphiqueStyle(type, labels, donnees, {
        couleurPrincipale,
        couleurSecondaire,
        degradation,
        arrondies,
        ombre,
        animation,
        titre
      });
    }

    function creerGraphiqueStyle(type, labels, donnees, style) {
      if (typeof Chart === 'undefined') {
        showToast("⚠️ Chart.js non chargé", true);
        addMessage("❌ Graphique indisponible", 'assistant');
        return;
      }
      
      const chartId = 'chart_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
      
      let backgroundColor;
      if (style.degradation && type === 'bar') {
        backgroundColor = function(context) {
          const ctx = context.chart.ctx;
          const gradient = ctx.createLinearGradient(0, 0, 0, 400);
          gradient.addColorStop(0, style.couleurPrincipale);
          gradient.addColorStop(0.7, style.couleurSecondaire);
          return gradient;
        };
      } else if (type === 'pie' || type === 'doughnut') {
        backgroundColor = ["#2563eb", "#7c3aed", "#06b6d4", "#f59e0b", "#ef4444"].slice(0, labels.length);
      } else {
        backgroundColor = style.couleurPrincipale;
      }
      
      const options = {
        responsive: true,
        maintainAspectRatio: false,
        animation: style.animation ? {
          duration: 2000,
          easing: 'easeInOutQuart'
        } : undefined,
        plugins: {
          legend: { 
            display: type === 'pie' || type === 'doughnut',
            position: 'top'
          },
          title: {
            display: true,
            text: style.titre,
            font: { size: 16, weight: 'bold' },
            color: '#1f2937',
            padding: { bottom: 30 }
          }
        }
      };
      
      if (type === 'bar') {
        options.elements = {
          bar: {
            borderRadius: style.arrondies ? 8 : 0,
            borderSkipped: false
          }
        };
        options.scales = {
          y: { 
            beginAtZero: true,
            grid: { color: 'rgba(0,0,0,0.05)' },
            ticks: { color: '#374151' }
          },
          x: { 
            grid: { display: false },
            ticks: { color: '#374151', font: { weight: '500' } }
          }
        };
      }
      
      const styleOmbre = style.ombre ? 'box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);' : '';
      
      const chartHTML = `
        <div style="margin:20px 0; padding:20px; background:#f9fafb; border-radius:12px; ${styleOmbre}">
          <div style="height:350px;">
            <canvas id="${chartId}" width="400" height="350" style="width:100%; height:100%;"></canvas>
          </div>
        </div>
      `;
      
      addMessage(chartHTML, 'assistant');
      
      setTimeout(() => {
        const canvas = document.getElementById(chartId);
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        
        if (style.degradation && type === 'bar' && typeof backgroundColor === 'function') {
          const gradient = ctx.createLinearGradient(0, 0, 0, 400);
          gradient.addColorStop(0, style.couleurPrincipale);
          gradient.addColorStop(0.7, style.couleurSecondaire);
          backgroundColor = gradient;
        }
        
        new Chart(ctx, {
          type: type,
          data: {
            labels: labels,
            datasets: [{
              label: 'Valeurs',
              data: donnees,
              backgroundColor: backgroundColor,
              borderColor: style.couleurPrincipale,
              borderWidth: 1,
              borderRadius: style.arrondies ? 8 : 0
            }]
          },
          options: options
        });
      }, 100);
    }

    // ============================================
    // ENVOI DE MESSAGE (MODIFIÉ)
    // ============================================
    async function sendMessage() {
      const message = input.value.trim();
      
      if (!message || currentMode !== 'chat' || isTypingEffectActive || isSending || isSearching) {
        return;
      }

      // 🎯 DÉTECTION DES DEMANDES DE GRAPHIQUES
      const lowerMsg = message.toLowerCase();
      const chartKeywords = ['graphique', 'camembert', 'barres', 'lignes', 'anneau', 'diagramme', 'chart', 'visualisation'];
      if (chartKeywords.some(keyword => lowerMsg.includes(keyword))) {
        analyserDescriptionGraphique(message);
        input.value = '';
        input.style.height = 'auto';
        handleInput();
        return;
      }

      // Détection des besoins de recherche
      function needsWebSearch(query) {
        const lowerQuery = query.toLowerCase();
        const searchTriggers = [
          'actualité', 'news', 'breaking', 'dernière minute', 'récent',
          'résultat', 'score', 'match', 'élection', 'vote', 'gagné', 'perdu',
          'prix', 'cours', 'taux', 'bourse', 'action', 'bitcoin', 'crypto', 'ethereum',
          'près de moi', 'proche', 'autour', 'restaurant', 'hôtel', 'magasin', 'où trouver',
          'météo', 'température', 'pluie', 'soleil', 'vent',
          'aujourd\'hui', 'maintenant', 'en ce moment', 'actuel', 'en direct',
          'cherche', 'trouve', 'recherche', 'information sur', 'je veux savoir',
          'âge de', 'taille de', 'date de naissance', 'biographie',
          'classement', 'ligue', 'championnat', 'coupe du monde'
        ];
        return searchTriggers.some(trigger => lowerQuery.includes(trigger));
      }

      if (needsWebSearch(message)) {
        performUniversalSearch(message);
        input.value = '';
        input.style.height = 'auto';
        handleInput();
        return;
      }

      isSending = true;
      sendBtn.disabled = true;
      addMessage(message, 'user');
      input.value = '';
      input.style.height = 'auto';
      finalTranscript = '';
      showTypingIndicator();
      suggestionsSection.classList.add('hidden');
      conversationArea.classList.remove('hidden');
      
      const recentHistory = buildContext(chatHistory, CONFIG.CHAT.MAX_HISTORY_MESSAGES);
      const messagesForAPI = [];
      recentHistory.forEach(msg => {
        messagesForAPI.push({ role: msg.sender === 'user' ? 'user' : 'assistant', content: msg.content });
      });
      
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, history: messagesForAPI })
        });
        
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const data = await response.json();
        removeTypingIndicator();
        
        if (data.reply) {
          const messageDiv = addMessage(data.reply, 'assistant');
          if (messageDiv) {
            const contentDiv = messageDiv.querySelector('.chat-response');
            if (contentDiv) await typeWriterEffect(contentDiv, data.reply, 12);
          }
          if (data.suggestions) showSuggestions(data.suggestions);
        }
      } catch (error) {
        removeTypingIndicator();
        addMessage("I'm having trouble connecting. Please try again.", 'assistant');
        console.error('Chat error:', error);
      } finally {
        isSending = false;
        sendBtn.disabled = input.value.trim() === '';
      }
    }

    function useSuggestion(text) {
      input.value = text;
      handleInput();
      if (text.trim() !== '' && !isSending && !isTypingEffectActive && !isSearching) sendMessage();
    }
